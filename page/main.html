<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
      <div class="head">
        <img src="/images/HAN.png" alt="">
        <img src="/images/Frame 18.png" alt="">
    </div>
    <div class="hero-section">
    <div class="content">
      
        <h2 class="title">Подбор работы для граждан СНГ и ЕАЭС</h2>
        
        <div class="quiz-card">
            <div class="quiz-info">
                <h3>Пройдите опрос</h3>
                <p>Подберем подходящие вакансии с зарплатой</p>
                <div class="cta-row">
                    <span class="price">от 3 000 р</span>
                    <button class="btn-primary">Пройти опрос</button>
                </div>
            </div>
            <div class="quiz-icon">
                <img style="width: 200px;" src="/images/Group 2181.png" alt="icon">
            </div>
        </div>

        <div class="action-footer">
            <button class="btn-green">Подобрать работу</button>
            <a href="#" class="wa-link">
                <img src="/images/Group 2180.png">
            </a>
        </div>
    </div>
    
    <div class="man-image">
        <img style="width: 600px;" src="/images/Group 2145.png">
    </div>
</div>
     
   <div class="banner">
  <div class="banner-content">
    <h1 class="banner-title">Рассмотрим всех!</h1>
    <div class="tag-container">
      <span class="tag tag-border">Без опыта</span>
      <span class="tag">Без документов</span>
    </div>
  </div>
  
  <div class="doc-icon">
    <div class="doc-sheet main"></div>
    <div class="doc-sheet back"></div>
  </div>
</div>

</body>
</html>
